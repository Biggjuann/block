<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BTI · Block Trade Indicator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232f8fff'/><text x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold'>B</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">B</div>
      <div>BLOCK&nbsp;TRADE&nbsp;INDICATOR<div class="sub">Monitor &amp; filter large trades in real-time</div></div>
    </div>
    <nav class="nav">
      <a href="/" class="active">Tape</a>
      <a href="/dashboard">Dashboard</a>
    </nav>
    <div class="spacer"></div>
    <div class="stat-chips">
      <div class="chip"><div class="k">Blocks Today</div><div class="v" id="stat-trades">--</div></div>
      <div class="chip"><div class="k">Notional</div><div class="v" id="stat-value">--</div></div>
    </div>
    <div id="status" class="status-pill warn"><span class="dot"></span>CONNECTING</div>
  </header>

  <main class="viewer" id="viewer"></main>

  <script type="module" src="/js/viewer.js"></script>
</body>
</html>
