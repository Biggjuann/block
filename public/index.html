<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BTI · Block Trade Indicator</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%232f8fff'/><text x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-family='monospace' font-weight='bold'>B</text></svg>" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="logo">B</div>
      <div>BLOCK&nbsp;TRADE&nbsp;INDICATOR<div class="sub">Monitor &amp; filter large trades in real-time</div></div>
    </div>
    <nav class="nav">
      <a href="/" class="active">Tape</a>
      <a href="/dashboard">Dashboard</a>
      <a href="/history">History</a>
    </nav>
    <div class="spacer"></div>
    <div class="stat-chips">
      <div class="chip"><div class="k">Blocks Today</div><div class="v" id="stat-trades">--</div></div>
      <div class="chip"><div class="k">Notional</div><div class="v" id="stat-value">--</div></div>
    </div>
    <div id="market" class="market-badge"></div>
    <button id="bell" class="bell" title="Alerts">🔔<span class="bell-badge" id="bell-badge" hidden>0</span></button>
    <div id="status" class="status-pill warn"><span class="dot"></span>CONNECTING</div>
  </header>

  <div class="toolbar">
    <div class="tool-group">
      <span class="tool-label">Min&nbsp;$</span>
      <div class="seg" id="notional-seg">
        <button class="seg-btn active" data-val="0">Any</button>
        <button class="seg-btn" data-val="1000000">$1M</button>
        <button class="seg-btn" data-val="5000000">$5M</button>
        <button class="seg-btn" data-val="10000000">$10M</button>
        <button class="seg-btn" data-val="25000000">$25M</button>
      </div>
    </div>

    <div class="tool-group">
      <span class="tool-label">Watchlist</span>
      <input id="watch-input" class="tool-input" placeholder="add ticker…" maxlength="6" />
      <div id="watch-chips" class="chips"></div>
      <label class="toggle"><input type="checkbox" id="watch-only" /> only</label>
    </div>

    <div class="spacer"></div>

    <div class="tool-group">
      <button id="alert-settings-btn" class="ghost-btn">⚙ Alert rules</button>
    </div>
  </div>

  <!-- Alert settings popover -->
  <div id="alert-pop" class="popover" hidden>
    <h3>Alert rules</h3>
    <p class="pop-hint">Fires when a print meets <b>either</b> rule. Set a field to <b>0</b> to disable it.</p>
    <label class="field">Notional ≥ $
      <input type="number" id="al-notional" step="1000000" />
    </label>
    <label class="field">% of ADV ≥
      <input type="number" id="al-pctadv" step="1" />
    </label>
    <label class="toggle"><input type="checkbox" id="al-watch-only" /> Watchlist only</label>
    <label class="toggle"><input type="checkbox" id="al-notify" /> Browser notifications</label>
    <label class="toggle"><input type="checkbox" id="al-sound" /> Sound</label>
    <button id="al-close" class="ghost-btn">Done</button>
  </div>

  <main class="viewer" id="viewer"></main>

  <!-- Alerts drawer -->
  <aside id="alerts-drawer" class="drawer">
    <div class="drawer-head">
      <h2>Alerts</h2>
      <button id="alerts-clear" class="ghost-btn sm">clear</button>
      <button id="drawer-close" class="ghost-btn sm">✕</button>
    </div>
    <div id="alerts-list" class="alerts-list"></div>
  </aside>

  <div id="toasts" class="toasts"></div>

  <script type="module" src="/js/viewer.js"></script>
</body>
</html>
